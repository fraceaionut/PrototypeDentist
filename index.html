<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal pacient iDentist</title>
  <style>
    :root {
      --bg: #eef8f8;
      --bg-soft: #f7fcfc;
      --card: #ffffff;
      --text: #16333a;
      --muted: #6b8a91;
      --accent: #58c6d0;
      --accent-dark: #2fa5b0;
      --accent-soft: #dff6f8;
      --border: #d8ecef;
      --success-bg: #e8f7ef;
      --success-text: #22704a;
      --error-bg: #fff1f1;
      --error-text: #b54747;
      --shadow: 0 18px 40px rgba(41, 113, 122, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fcfc 0%, #e8f7f8 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      padding: 32px;
      background: linear-gradient(135deg, #ffffff 0%, #edf9fa 100%);
      border-bottom: 1px solid var(--border);
    }

    .hero-badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 38px;
      line-height: 1.1;
      color: #17343a;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 600px;
      font-size: 15px;
    }

    .hero-side {
      background: linear-gradient(180deg, #66d2dc 0%, #47bbc7 100%);
      color: white;
      border-radius: 24px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 220px;
    }

    .hero-side h3 {
      margin: 0 0 12px;
      font-size: 24px;
      line-height: 1.2;
    }

    .hero-side p {
      margin: 0;
      line-height: 1.6;
      color: rgba(255,255,255,0.94);
    }

    .quick-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 18px;
    }

    .quick-info div {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
    }

    .content {
      padding: 28px 32px 34px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 0 0 auto;
      min-width: 140px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 13px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .tab.active,
    .tab:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .auth-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .card-subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      padding: 14px 15px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fbfefe;
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(88,198,208,0.14);
    }

    button.primary, button.secondary, button.ghost {
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 18px;
      transition: 0.2s ease;
    }

    button.primary {
      width: 100%;
